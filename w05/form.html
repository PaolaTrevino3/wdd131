<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Product review form for WDD 131 assidment.">
    <meta name="author" content="Paola Trevino">
    <title>Product Reviw Form</title>

    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
    </head>
    <body>
        <header>
            <h1>Product Review</h1>
        </header>

        <main>
            <form method="get" action="review.html">
                <label for="product">
                    Product Name <span class="required">*</span>
                </label>
                <select id="product" name="product" required>
                    <option value="" disabled selected>Select a Product...</option>
                </select>

                <fieldset>
                    <legend>Overall Rating <span class="required">"*</span></legend>

                    <label><input type="radio" name="rating" value="1" required>✩</label>
                    <label><input type="radio" name="rating" value="2">✩✩</label>
                    <label><input type="radio" name="rating" value="3">✩✩✩</label>
                    <label><input type="radio" name="rating" value="4">✩✩✩✩</label>
                    <label><input type="radio" name="rating" value="5">✩✩✩✩✩</label>
                </fieldset>

                <label for="installDate">
                    Date of installation <span class="required">*</span></label>
                <input type="date" id="installDate" name="installDate" required>

                <fieldset>
                    <legend>Which features do you find useful?</legend>

                    <label for="durability"><input type="checkbox" id="durability" name=" features" value=" durability">Durability</label>
                    <label for="ease"><input type=" check box" id="ease" name="features" value="ease-of-use"> Ease of use</label>
                    <label for=" performance"><input type=" checkbox" id=" performance" name=" features" value=" performance"> Performance</label>
                    <label for=" design"><input type=" check box" id=" design" name=" features" value=" design">Design</label>
                </fieldset>

                <label for=" review"> Written Review</label>
                <textarea name="review" id="review"></textarea>

                <label for=" userName">Your Name</label>
                <input type="text" id="userName" name="userName">

                <input type=" submit" value="Submit Review">
            </form>
        </main>

        <footer>
            <p>&copy; <span id="currentyear"></span>|Paola Trevono| Texas</p>
            <p id="lastModified"></p>
        </footer>
    </body>
    </html>
